name: Update Weather Dashboard

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Generate dashboard
        run: |
          python collect.py
          python verify.py
          python report.py

      - name: Commit and push
        run: |
          git config user.name "Weather Bot"
          git config user.email "bot@georgiaweather.local"
          git add index.html dashboard.html weather.db
          git diff --staged --quiet || git commit -m "Update weather $(date -u +%Y-%m-%d_%H:%M UTC)"
          git pull --rebase
          git push
